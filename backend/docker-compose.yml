version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: n8neiritech-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: n8neiritech
      MYSQL_USER: n8nuser
      MYSQL_PASSWORD: n8npass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8neiritech-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: n8neiritech-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8neiritech-network

  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: n8neiritech-api
    environment:
      # Connection Strings
      ConnectionStrings__DefaultConnection: "Server=mysql;Port=3306;Database=n8neiritech;User=n8nuser;Password=n8npass123;"
      Redis__ConnectionString: "redis:6379,abortConnect=false"

      # JWT Configuration
      Jwt__Secret: ${JWT_SECRET:-change-this-secret-key-in-production-minimum-32-characters}
      Jwt__Issuer: ${JWT_ISSUER:-n8neiritech}
      Jwt__Audience: ${JWT_AUDIENCE:-n8neiritech-clients}
      Jwt__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES:-15}
      Jwt__RefreshTokenExpirationDays: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:-30}

      # WhatsApp Configuration
      WhatsApp__Provider: ${WHATSAPP_PROVIDER:-Fake}
      WhatsApp__BaseUrl: ${WHATSAPP_BASE_URL:-http://localhost:8080}
      WhatsApp__ApiToken: ${WHATSAPP_API_TOKEN:-}
      WhatsApp__InstanceName: ${WHATSAPP_INSTANCE_NAME:-default}
      WhatsApp__WebhookSecret: ${WHATSAPP_WEBHOOK_SECRET:-change-this-webhook-secret}

      # AI Configuration - Google Gemini
      Ai__Provider: ${AI_PROVIDER:-Google}
      Ai__BaseUrl: ${AI_BASE_URL:-https://generativelanguage.googleapis.com}
      Ai__ApiKey: ${AI_API_KEY:-AIzaSyAp69cJwJwu05OqqFbxa9OVs0LdX5G2KK4}
      Ai__Model: ${AI_MODEL:-gemini-1.5-flash}

      # CORS Configuration
      Cors__AllowedOrigins__0: http://localhost:5173
      Cors__AllowedOrigins__1: http://localhost:3000

      # Application Settings
      InternalApiKey: ${INTERNAL_API_KEY:-change-this-internal-api-key}
      SeedData: ${SEED_DATA:-true}
      ApplyMigrationsOnStartup: ${APPLY_MIGRATIONS_ON_STARTUP:-true}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5000:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - n8neiritech-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  n8neiritech-network:
    driver: bridge
