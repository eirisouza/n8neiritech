services:
  # ──────────────────────────────────────────────────────────────────────────
  # MySQL
  # ──────────────────────────────────────────────────────────────────────────
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: n8neiritech-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: n8neiritech
      MYSQL_USER: n8nuser
      MYSQL_PASSWORD: n8npass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8neiritech-net

  # ──────────────────────────────────────────────────────────────────────────
  # Redis
  # ──────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: n8neiritech-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - n8neiritech-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # Backend ASP.NET Core
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: n8neiritech-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Server=mysql;Port=3306;Database=n8neiritech;User=n8nuser;Password=n8npass123;"
      Redis__ConnectionString: "redis:6379,******"
      Jwt__Secret: ${JWT_SECRET:-change-this-jwt-secret-key-minimum-32-chars}
      Jwt__Issuer: ${JWT_ISSUER:-n8neiritech}
      Jwt__Audience: ${JWT_AUDIENCE:-n8neiritech-clients}
      Jwt__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES:-15}
      Jwt__RefreshTokenExpirationDays: ${REFRESH_TOKEN_EXPIRATION_DAYS:-30}
      WhatsApp__Provider: ${WHATSAPP_PROVIDER:-Fake}
      WhatsApp__BaseUrl: ${WHATSAPP_BASE_URL:-}
      WhatsApp__ApiToken: ${WHATSAPP_API_TOKEN:-}
      WhatsApp__InstanceName: ${WHATSAPP_INSTANCE:-default}
      WhatsApp__WebhookSecret: ${WHATSAPP_WEBHOOK_SECRET:-change-this-webhook-secret}
      Ai__Provider: ${AI_PROVIDER:-None}
      Ai__BaseUrl: ${AI_BASE_URL:-}
      Ai__ApiKey: ${AI_API_KEY:-}
      Ai__Model: ${AI_MODEL:-gpt-4o-mini}
      InternalApiKey: ${N8N_INTERNAL_API_KEY:-change-this-internal-api-key}
      Cors__AllowedOrigins__0: ${FRONTEND_URL:-http://localhost:5173}
      SeedData: "false"
      ApplyMigrationsOnStartup: "false"
      N8nWebhookUrl: ${N8N_WEBHOOK_URL:-http://n8n:5678}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - n8neiritech-net
    volumes:
      - backend_logs:/app/logs
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend React
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${BACKEND_URL:-http://localhost:5000}
    container_name: n8neiritech-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - n8neiritech-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────────
  # n8n
  # ──────────────────────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8neiritech-n8n
    restart: unless-stopped
    environment:
      N8N_HOST: ${N8N_HOST:-0.0.0.0}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change-this-n8n-encryption-key}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-admin123}
      DB_TYPE: mysqldb
      DB_MYSQLDB_HOST: mysql
      DB_MYSQLDB_PORT: 3306
      DB_MYSQLDB_DATABASE: ${MYSQL_DATABASE:-n8neiritech}
      DB_MYSQLDB_USER: ${MYSQL_USER:-n8nuser}
      DB_MYSQLDB_PASSWORD: ${MYSQL_PASSWORD:-n8npass123}
      DB_MYSQLDB_SCHEMA: n8n
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: none
      EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: "true"
      GENERIC_TIMEZONE: America/Sao_Paulo
      # Variáveis disponíveis nos workflows
      BACKEND_URL: http://backend:5000
      N8N_INTERNAL_API_KEY: ${N8N_INTERNAL_API_KEY:-change-this-internal-api-key}
      WHATSAPP_WEBHOOK_SECRET: ${WHATSAPP_WEBHOOK_SECRET:-change-this-webhook-secret}
    ports:
      - "${N8N_PORT:-5678}:5678"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - n8neiritech-net
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ──────────────────────────────────────────────────────────────────────────
  # Evolution API (WhatsApp Provider - opcional)
  # Descomente para usar o provedor Evolution API
  # ──────────────────────────────────────────────────────────────────────────
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: n8neiritech-evolution
    restart: unless-stopped
    environment:
      SERVER_URL: http://evolution-api:8080
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${WHATSAPP_API_TOKEN:-evolution-api-key}
      DATABASE_ENABLED: "true"
      DATABASE_CONNECTION_URI: "mysql://${MYSQL_USER:-n8neiritech}:${MYSQL_PASSWORD:-n8neiritech_secret}@mysql:3306/${MYSQL_DB:-n8neiritech}"
      REDIS_ENABLED: "true"
      REDIS_URI: "redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379"
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: "http://backend:5000/api/whatsapp/webhook"
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
    networks:
      - n8neiritech-net
    volumes:
      - evolution_data:/evolution/instances
    profiles:
      - evolution

networks:
  n8neiritech-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  n8n_data:
  backend_logs:
  backend_uploads:
  evolution_data:
